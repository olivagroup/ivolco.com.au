<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IVOLCO | Portfolio</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #f6f2ea;
      --paper: rgba(255, 255, 255, 0.78);
      --line: rgba(34, 34, 34, 0.1);
      --text: #1e1d1a;
      --muted: #5f5a52;
      --accent: #9c7a45;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
      --max: 1120px;
      --title-font: Arial, Helvetica, sans-serif;
      --body-font: "Lato", Arial, Helvetica, sans-serif;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--body-font);
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(156, 122, 69, 0.08), transparent 32%),
        radial-gradient(circle at bottom right, rgba(156, 122, 69, 0.08), transparent 28%),
        linear-gradient(180deg, #fbf8f2 0%, var(--bg) 100%);
      line-height: 1.75;
    }
    a { color: inherit; text-decoration: none; }

    .site-header {
      position: sticky;
      top: 0;
      backdrop-filter: blur(14px);
      background: rgba(246, 242, 234, 0.86);
      border-bottom: 1px solid var(--line);
    }

    .header-inner {
      width: min(var(--max), calc(100% - 32px));
      margin: 0 auto;
      min-height: 92px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 24px;
      padding: 14px 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .brand img {
      width: 70px;
      height: 70px;
      object-fit: contain;
      display: block;
    }

    .brand-name {
      margin: 0;
      font-size: 32px;
      letter-spacing: 3px;
      line-height: 1;
      font-family: var(--title-font);
      text-transform: uppercase;
      font-weight: 700;
    }

    .brand-tag {
      margin-top: 7px;
      font-family: var(--title-font);
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .nav {
      display: flex;
      justify-content: center;
      gap: 24px;
      flex-wrap: wrap;
    }

    .nav a {
      font-family: var(--title-font);
      text-transform: uppercase;
      font-size: 0.82rem;
      letter-spacing: 0.18em;
      color: var(--muted);
    }

    .header-cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 18px;
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #fff;
      border-radius: 999px;
      font-family: var(--title-font);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .stub-page {
      width: min(900px, calc(100% - 32px));
      margin: 0 auto;
      padding: 42px 0 72px;
    }

    .stub-card {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 32px;
    }

    .stub-title {
      font-family: var(--title-font);
      text-transform: uppercase;
      font-size: 1.5rem;
      letter-spacing: 0.12em;
      color: var(--accent);
      margin: 0 0 16px;
      font-weight: 700;
      line-height: 1.15;
    }

    .stub-text {
      margin: 0;
      font-family: var(--body-font);
      font-size: clamp(1.08rem, 1.65vw, 1.3rem);
      color: var(--text);
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="index.html">
        <img src="assets/images/logo.png" alt="IVOLCO logo" />
        <div>
          <div class="brand-name">IVOLCO</div>
          <div class="brand-tag">Property Development &amp; Investment</div>
        </div>
      </a>

      <nav class="nav">
        <a href="index.html#index.html">Home</a>
        <a href="index.html#process.html">Process</a>
        <a href="index.html#portfolio.html">Portfolio</a>
      </nav>

      <a class="header-cta" href="index.html#contact-title">Request Discussion</a>
    </div>
  </header>

  <main class="stub-page">
    <div class="stub-card">
      <div class="stub-title">Portfolio</div>
      <p class="stub-text">Under construction.</p>
    </div>
  </main>
</body>
</html>
